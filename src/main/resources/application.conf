nostr {

  relays {
    urls = " [ wss://relay.damus.io , wss://nos.lol , wss://relay.snort.social , wss://nostr.wine ]"
    urls = ${?NOSTR_RELAYS}
    sync-since = ${?SYNC_SINCE}

    sync-until   = ${?SYNC_UNTIL}

    public-keys-follow-file = ${?BQ_RESULTS_FOLLOW_FILE}
  }

  big-query {
    project-id = ${?GOOGLE_CLOUD_PROJECT}

    dataset-id = ${?BIGQUERY_DATASET}

    table-id = ${?BIGQUERY_TABLE}

    monitored-pub-key-table-id = ""
    monitored-pub-key-table-id = ${?BIGQUERY_MONITORED_PUBKEY_TABLE_ID}

    credentials-path = ${?GOOGLE_APPLICATION_CREDENTIALS}

    batch-size = 10
    batch-size = ${?BATCH_SIZE}

    batch-timeout = "3 seconds"
    batch-timeout = ${?BATCH_TIMEOUT}

    write-disposition = "WRITE_APPEND"
    write-disposition = ${?BIGQUERY_WRITE_DISPOSITION}
  }

  pipeline {
    parallelism = 4
    parallelism = ${?PIPELINE_PARALLELISM}

    buffer-size = 100
    buffer-size = ${?BUFFER_SIZE}

    reconnect-delay = "5 seconds"
    reconnect-delay = ${?RECONNECT_DELAY}

    max-reconnect-attempts = 10
    max-reconnect-attempts = ${?MAX_RECONNECT_ATTEMPTS}
  }

  logging {
    level = "INFO"
    level = ${?LOG_LEVEL}
  }
}
