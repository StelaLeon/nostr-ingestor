nostr {
  relays {
    urls = [
        "wss://relay.damus.io",
        "wss://nos.lol",
        "wss://relay.snort.social",
        "wss://nostr.wine"
    ]
    urls = ${?NOSTR_RELAYS}

    sync-since = "2024-12-18"
    sync-since = ${?SYNC_SINCE}

    sync-until   = "2025-02-05"
    sync-until   = ${?SYNC_UNTIL}

    public-keys-follow-file = "src/main/resources/bla.txt"

  }

  big-query {
    project-id = "project-id"
    project-id = ${?GOOGLE_CLOUD_PROJECT}

    dataset-id = "dataset-test"
    dataset-id = ${?BIGQUERY_DATASET}

    table-id = "table-id"
    table-id = ${?BIGQUERY_TABLE}

    monitored-pub-key-table-id = "nostr_datalake_stalking_v1"
    monitored-pub-key-table-id = ${?BIGQUERY_MONITORED_PUBKEY_TABLE_ID}

    # Path to service account key JSON
    credentials-path = ${?GOOGLE_APPLICATION_CREDENTIALS}
    
    # Batch settings
    batch-size = 1000
    batch-size = ${?BATCH_SIZE}
    
    batch-timeout = "3 seconds"
    batch-timeout = ${?BATCH_TIMEOUT}
    
    # Write disposition: WRITE_APPEND, WRITE_TRUNCATE, WRITE_EMPTY
    write-disposition = "WRITE_APPEND"
    write-disposition = ${?BIGQUERY_WRITE_DISPOSITION}
  }
  
  pipeline {
    # Parallelism for processing streams
    parallelism = 4
    parallelism = ${?PIPELINE_PARALLELISM}
    
    # Buffer size for stream processing
    buffer-size = 100
    buffer-size = ${?BUFFER_SIZE}
    
    # Reconnection settings
    reconnect-delay = "5 seconds"
    reconnect-delay = ${?RECONNECT_DELAY}
    
    max-reconnect-attempts = 10
    max-reconnect-attempts = ${?MAX_RECONNECT_ATTEMPTS}
  }
  
  logging {
    # Log level: TRACE, DEBUG, INFO, WARN, ERROR
    level = "INFO"
    level = ${?LOG_LEVEL}
  }
}
