nostr {
  relays {
    urls = [
        "wss://relay.damus.io",
        "wss://nos.lol",
        "wss://relay.snort.social",
        "wss://nostr.wine"
    ]
    urls = ${?NOSTR_RELAYS}

    sync-since = "2024-12-18"
    sync-since = ${?SYNC_SINCE}

    sync-until   = "2025-02-05"

    public-keys-follow-file = "src/main/resources/bla.txt"

  }

  big-query {
    project-id = "project-id"

    dataset-id = "dataset-test"

    table-id = "table-id"

    monitored-pub-key-table-id = "nostr_datalake_stalking_v1"

    credentials-path = "secret creds"

    batch-size = 1000

    batch-timeout = "3 seconds"

    write-disposition = "WRITE_APPEND"
  }
  
  pipeline {
    parallelism = 4

    buffer-size = 100

    reconnect-delay = "5 seconds"

    max-reconnect-attempts = 10
  }
  
  logging {
    # Log level: TRACE, DEBUG, INFO, WARN, ERROR
    level = "INFO"
  }
}
