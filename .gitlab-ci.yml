stages:
  - test
  - build
  - package

variables:
  SBT_VERSION: "1.9.7"
  SCALA_VERSION: "3.3.1"
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  # Docker image will be tagged with commit SHA and branch name
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest

# Cache SBT dependencies between jobs
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .ivy2/
    - .sbt/
    - target/
    - project/target/

before_script:
  - export SBT_OPTS="-Xmx2G -Xms1G -Dsbt.ivy.home=.ivy2 -Dsbt.global.base=.sbt"

test:
  stage: test
  image: sbtscala/scala-sbt:eclipse-temurin-jammy-21.0.1_12_1.9.7_3.3.1
  script:
    - sbt clean test
  artifacts:
    reports:
      junit: target/test-reports/*.xml
    paths:
      - target/test-reports/
    when: always
    expire_in: 1 week

build:
  stage: build
  image: sbtscala/scala-sbt:eclipse-temurin-jammy-21.0.1_12_1.9.7_3.3.1
  script:
    - sbt clean compile assembly
  artifacts:
    paths:
      - target/scala-3.3.1/*.jar
    expire_in: 1 day
  only:
    - main
    - develop
    - tags

docker:
  stage: package
  image: docker:24-dind
  services:
    - docker:24-dind
  dependencies:
    - build
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - |
      cat > src/main/resources/application.conf <<EOF
      nostr {
        relays = [${NOSTR_RELAYS:-"\"wss://relay.damus.io\", \"wss://nos.lol\""}]
      
        bigquery {
          project-id = "\${?GOOGLE_CLOUD_PROJECT}"
          dataset-id = "\${?BIGQUERY_DATASET}"
          table-id = "\${?BIGQUERY_TABLE}"
      
          batch-size = \${?BATCH_SIZE:-1000}
          batch-timeout = \${?BATCH_TIMEOUT:-"30 seconds"}
        }
      
        pipeline {
          parallelism = \${?PIPELINE_PARALLELISM:-4}
      
          buffer-size = \${?BUFFER_SIZE:-100}
        }
      }
      EOF
    - docker build
      --build-arg GOOGLE_CLOUD_PROJECT=$GOOGLE_CLOUD_PROJECT
      --build-arg BIGQUERY_DATASET=$BIGQUERY_DATASET
      --build-arg BIGQUERY_TABLE=$BIGQUERY_TABLE
      -t $IMAGE_TAG
      -t $IMAGE_LATEST .
    - docker push $IMAGE_TAG
    - docker push $IMAGE_LATEST
  only:
    - main
    - develop
    - tags

# Docker build for merge requests (without push)
docker:mr:
  stage: package
  image: docker:24-dind
  services:
    - docker:24-dind
  dependencies:
    - build
  script:
    - docker build -t $CI_REGISTRY_IMAGE:mr-$CI_MERGE_REQUEST_IID .
  only:
    - merge_requests
  except:
    - main
    - develop

scala-steward:
  image: 
    name: fthomas/scala-steward:latest
    entrypoint: ["/bin/sh", "-c"]
  only:
    - schedules
  variables:
    GIT_AUTHOR_EMAIL: "scala-steward@yourdomain.com"
  before_script:
    - mkdir -p /workspace
    - echo '#!/bin/sh' > /askpass.sh
    - echo 'echo $SCALA_STEWARD_TOKEN' >> /askpass.sh
    - chmod +x /askpass.sh
  script:
    - /opt/docker/bin/scala-steward --forge-type gitlab  --forge-api-host https://gitlab.com/api/v4 --forge-login $GITLAB_USER_LOGIN --do-not-fork --git-ask-pass /askpass.sh --git-author-email $GIT_AUTHOR_EMAIL --workspace /workspace --repos-file $CI_PROJECT_DIR/repos.md